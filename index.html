<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahorcado Troll</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 95%;
        max-width: 520px;
        padding: 25px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        color: #fff;
        text-align: center;
      }

      h1 {
        margin-bottom: 10px;
      }

      .stats {
        margin-bottom: 10px;
        font-weight: bold;
        color: #ffeb3b;
      }

      canvas {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 15px;
        margin: 10px 0;
      }

      .word {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 15px 0;
      }

      .letter {
        width: 30px;
        border-bottom: 3px solid #fff;
        font-size: 1.5rem;
        text-transform: uppercase;
      }

      .keyboard {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .keyboard button {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.3);
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      .keyboard button:hover:not(:disabled) {
        transform: scale(1.1);
        background: rgba(255, 255, 255, 0.6);
      }

      .keyboard button:disabled {
        opacity: 0.4;
      }

      .message {
        margin-top: 15px;
        min-height: 30px;
        font-size: 1.15rem;
      }

      .reset {
        margin-top: 15px;
        padding: 10px 25px;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.35);
        color: white;
        font-size: 1rem;
      }

      .reset:hover {
        background: rgba(255, 255, 255, 0.6);
      }

      @media (max-width: 480px) {
        .letter {
          width: 24px;
          font-size: 1.3rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🪢 Ahorcado Troll</h1>
      <div class="stats">🏆 Victorias: <span id="wins">0</span></div>

      <canvas id="canvas" width="200" height="200"></canvas>

      <div class="word" id="word"></div>
      <div class="keyboard" id="keyboard"></div>
      <div class="message" id="message"></div>

      <button class="reset" onclick="resetGame()">🔄 Reiniciar</button>
    </div>

    <script>
      const words = [
        "javascript",
        "backend",
        "frontend",
        "programacion",
        "canvas",
        "murcielago",
        "desarrollo",
        "algoritmo",
        "variable",
        "funcion",
        "debugging",
        "compilador",  
        "framework",
      ];
      const trollMessages = [
        "😈 JAJA, eso estuvo malísimo",
        "💀 Ni cerca…",
        "🧠 Usa el cerebro, campeón",
        "😂 La máquina se ríe de ti",
      ];

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let wins = parseInt(localStorage.getItem("wins")) || 0;
      document.getElementById("wins").textContent = wins;

      let word = "";
      let guessed = [];
      let errors = 0;
      const maxErrors = 6;

      function startGame() {
        word = words[Math.floor(Math.random() * words.length)];
        guessed = [];
        errors = 0;
        ctx.clearRect(0, 0, 200, 200);
        document.getElementById("message").textContent = "";
        renderWord();
        renderKeyboard();
      }

      function drawHangman(step) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#fff";

        if (step === 1) {
          ctx.beginPath();
          ctx.moveTo(20, 180);
          ctx.lineTo(180, 180);
          ctx.stroke();
        }
        if (step === 2) {
          ctx.beginPath();
          ctx.moveTo(50, 180);
          ctx.lineTo(50, 20);
          ctx.lineTo(120, 20);
          ctx.stroke();
        }
        if (step === 3) {
          ctx.beginPath();
          ctx.moveTo(120, 20);
          ctx.lineTo(120, 40);
          ctx.stroke();
        }
        if (step === 4) {
          ctx.beginPath();
          ctx.arc(120, 55, 15, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (step === 5) {
          ctx.beginPath();
          ctx.moveTo(120, 70);
          ctx.lineTo(120, 120);
          ctx.stroke();
        }
        if (step === 6) {
          ctx.beginPath();
          ctx.moveTo(120, 80);
          ctx.lineTo(95, 105);
          ctx.moveTo(120, 80);
          ctx.lineTo(145, 105);
          ctx.moveTo(120, 120);
          ctx.lineTo(95, 150);
          ctx.moveTo(120, 120);
          ctx.lineTo(145, 150);
          ctx.stroke();
        }
      }

      function renderWord() {
        const wordDiv = document.getElementById("word");
        wordDiv.innerHTML = "";
        word.split("").forEach((l) => {
          const s = document.createElement("span");
          s.className = "letter";
          s.textContent = guessed.includes(l) ? l : "";
          wordDiv.appendChild(s);
        });
      }

      function renderKeyboard() {
        const kb = document.getElementById("keyboard");
        kb.innerHTML = "";
        for (let i = 97; i <= 122; i++) {
          const b = document.createElement("button");
          b.textContent = String.fromCharCode(i);
          b.onclick = () => guess(b.textContent, b);
          kb.appendChild(b);
        }
      }

      function guess(letter, button) {
        button.disabled = true;
        if (word.includes(letter)) {
          guessed.push(letter);
          renderWord();
          checkWin();
        } else {
          errors++;
          drawHangman(errors);
          document.getElementById("message").textContent =
            trollMessages[Math.floor(Math.random() * trollMessages.length)];
          checkLose();
        }
      }

      function checkWin() {
        if (word.split("").every((l) => guessed.includes(l))) {
          wins++;
          localStorage.setItem("wins", wins);
          document.getElementById("wins").textContent = wins;
          document.getElementById("message").textContent =
            "🎉 Ganaste… por ahora.";
          disableKeyboard();
        }
      }

      function checkLose() {
        if (errors === maxErrors) {
          document.getElementById("message").textContent =
            `💀 PERDISTE. La palabra era "${word}". Skill issue 😈`;
          disableKeyboard();
        }
      }

      function disableKeyboard() {
        document
          .querySelectorAll(".keyboard button")
          .forEach((b) => (b.disabled = true));
      }

      function resetGame() {
        startGame();
      }

      startGame();
    </script>
  </body>
</html>
