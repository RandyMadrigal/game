<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahorcado Troll</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #141e30, #243b55);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

body.hard-mode {
  background: radial-gradient(circle at top, #300000, #000);
}

.container {
  width: 95%;
  max-width: 520px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.18);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  color: #fff;
  text-align: center;
  transition: 0.4s;
}

body.hard-mode .container {
  background: rgba(40,0,0,0.9);
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.stats {
  margin-bottom: 6px;
  font-weight: bold;
  color: #ffeb3b;
}

body.hard-mode .stats {
  color: #ff5c5c;
}

canvas {
  background: rgba(255,255,255,0.15);
  border-radius: 15px;
  margin: 10px 0;
}

body.hard-mode canvas {
  background: rgba(0,0,0,0.6);
  box-shadow: inset 0 0 15px rgba(255,0,0,0.4);
}

.word {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px 0;
}

.letter {
  width: 30px;
  border-bottom: 3px solid #fff;
  font-size: 1.5rem;
}

.keyboard {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.keyboard button {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
}

body.hard-mode .keyboard button {
  background: rgba(90,0,0,0.7);
}

.keyboard button:disabled {
  opacity: 0.4;
}

.controls button {
  margin: 8px;
  padding: 10px 20px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.35);
  color: white;
}

body.hard-mode .controls button {
  background: linear-gradient(135deg, #600000, #200000);
}

.message {
  min-height: 28px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
  <h1>🪢 Ahorcado Troll</h1>

  <div class="stats">🏆 Victorias: <span id="wins">0</span></div>
  <div class="stats">🌍 Idioma: <span id="language">---</span></div>
  <div class="stats">⏳ Tiempo: <span id="timer">∞</span></div>

  <canvas id="canvas" width="200" height="200"></canvas>

  <div class="word" id="word"></div>
  <div class="keyboard" id="keyboard"></div>
  <div class="message" id="message"></div>

  <div class="controls">
    <button onclick="resetGame()">🔄 Reiniciar</button>
    <button onclick="giveHint()">💡 Pista</button>
    <button onclick="toggleHardMode()"> Hard Mode </button>
  </div>
</div>

<script>
      const words = [
        { text: "javascript", lang: "Inglés" },
        { text: "backend", lang: "Inglés" },
        { text: "frontend", lang: "Inglés" },
        { text: "docker", lang: "Inglés" },
        { text: "framework", lang: "Inglés" },
        { text: "programacion", lang: "Español" },
        { text: "murcielago", lang: "Español" },
        { text: "algoritmo", lang: "Español" },
        { text: "computadora", lang: "Español" },
        { text: "seguridad", lang: "Español" },
        { text: "python", lang: "Inglés" },
        { text: "java", lang: "Inglés" },
        { text: "typescript", lang: "Inglés" },
        { text: "html", lang: "Inglés" },
        { text: "css", lang: "Inglés" },
        { text: "variable", lang: "Español" },
        { text: "funcion", lang: "Español" },
        { text: "servidor", lang: "Español" },
        { text: "cliente", lang: "Español" },
        { text: "internet", lang: "Español" },
        { text: "cloud", lang: "Inglés" },
        { text: "firewall", lang: "Inglés" },
        { text: "token", lang: "Inglés" },
        { text: "json", lang: "Inglés" },
        { text: "xml", lang: "Inglés" },
        { text: "redes", lang: "Español" },
        { text: "pantalla", lang: "Español" },
        { text: "teclado", lang: "Español" },
        { text: "memoria", lang: "Español" },
        { text: "procesador", lang: "Español" },
        { text: "linux", lang: "Inglés" },
        { text: "windows", lang: "Inglés" },
        { text: "android", lang: "Inglés" },
        { text: "ios", lang: "Inglés" },
        { text: "rust", lang: "Inglés" },
        { text: "golang", lang: "Inglés" },
        { text: "csharp", lang: "Inglés" },
        { text: "debugging", lang: "Inglés" },
        { text: "compilador", lang: "Español" },
        { text: "inteligencia", lang: "Español" },
        { text: "artificial", lang: "Español" },
        { text: "robotica", lang: "Español" },
        { text: "machinelearning", lang: "Inglés" },
        { text: "dataset", lang: "Inglés" },
        { text: "modelo", lang: "Español" },
        { text: "entrenamiento", lang: "Español" },
        { text: "redneuronal", lang: "Español" },

        { text: "integral", lang: "Español" },
        { text: "derivada", lang: "Español" },
        { text: "ecuacion", lang: "Español" },
        { text: "physics", lang: "Inglés" },
        { text: "chemistry", lang: "Inglés" },
        { text: "biology", lang: "Inglés" },
        { text: "astronomy", lang: "Inglés" },
        { text: "planeta", lang: "Español" },
        { text: "galaxia", lang: "Español" },
        { text: "universo", lang: "Español" },
        { text: "estrella", lang: "Español" },
        { text: "cometa", lang: "Español" },
        { text: "asteroide", lang: "Español" },
        { text: "saturno", lang: "Español" },
        { text: "marte", lang: "Español" },
        { text: "venus", lang: "Español" },
        { text: "tierra", lang: "Español" },
        { text: "ocean", lang: "Inglés" },
        { text: "mountain", lang: "Inglés" },
        { text: "volcano", lang: "Inglés" },
        { text: "forest", lang: "Inglés" },
        { text: "desert", lang: "Inglés" },
        { text: "ciudad", lang: "Español" },
        { text: "pueblo", lang: "Español" },
        { text: "historia", lang: "Español" },
        { text: "arte", lang: "Español" },
        { text: "musica", lang: "Español" },
        { text: "pintura", lang: "Español" },
        { text: "escultura", lang: "Español" },
        { text: "teatro", lang: "Español" },
        { text: "cine", lang: "Español" },
        { text: "literatura", lang: "Español" },
        { text: "poesia", lang: "Español" },
        { text: "novela", lang: "Español" },
        { text: "ensayo", lang: "Español" },
        { text: "filosofia", lang: "Español" },
        { text: "psicologia", lang: "Español" },
        { text: "sociologia", lang: "Español" },
        { text: "economia", lang: "Español" },
        { text: "politica", lang: "Español" },
        { text: "science", lang: "Inglés" },
        { text: "technology", lang: "Inglés" },
        { text: "innovation", lang: "Inglés" },
        { text: "knowledge", lang: "Inglés" },
        { text: "education", lang: "Inglés" },
        { text: "culture", lang: "Inglés" },
        { text: "history", lang: "Inglés" },
        { text: "philosophy", lang: "Inglés" },
        { text: "psychology", lang: "Inglés" },
        { text: "sociology", lang: "Inglés" },
        { text: "economics", lang: "Inglés" },
        { text: "politics", lang: "Inglés" },
      ];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let HARD_MODE = false;
let maxErrors = 6;
let timeLeft = Infinity;
let timer;

let wins = Number(localStorage.getItem("wins")) || 0;
document.getElementById("wins").textContent = wins;

let word = "", language = "", guessed = [], errors = 0, hintUsed = false;

/* === DIBUJOS === */
const normalDrawings = [
  () => { ctx.moveTo(20,180); ctx.lineTo(180,180); },
  () => { ctx.moveTo(50,180); ctx.lineTo(50,20); ctx.lineTo(120,20); },
  () => { ctx.moveTo(120,20); ctx.lineTo(120,40); },
  () => { ctx.arc(120,55,15,0,Math.PI*2); },
  () => { ctx.moveTo(120,70); ctx.lineTo(120,120); },
  () => {
    ctx.moveTo(120,80); ctx.lineTo(95,105);
    ctx.moveTo(120,80); ctx.lineTo(145,105);
    ctx.moveTo(120,120); ctx.lineTo(95,150);
    ctx.moveTo(120,120); ctx.lineTo(145,150);
  }
];

const hardDrawings = [
  () => {
    ctx.moveTo(20,180); ctx.lineTo(180,180);
    ctx.moveTo(50,180); ctx.lineTo(50,20);
    ctx.lineTo(120,20); ctx.lineTo(120,40);
  },
  () => {
    ctx.arc(120,55,15,0,Math.PI*2);
    ctx.moveTo(120,70); ctx.lineTo(120,120);
  },
  () => {
    ctx.moveTo(120,80); ctx.lineTo(95,105);
    ctx.moveTo(120,80); ctx.lineTo(145,105);
    ctx.moveTo(120,120); ctx.lineTo(95,150);
    ctx.moveTo(120,120); ctx.lineTo(145,150);
  }
];

function drawHangman(step) {
  ctx.beginPath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = HARD_MODE ? "#ff2e2e" : "#fff";
  const set = HARD_MODE ? hardDrawings : normalDrawings;
  if (set[step - 1]) set[step - 1]();
  ctx.stroke();
}

/* === JUEGO === */
function toggleHardMode() {
  HARD_MODE = !HARD_MODE;
  document.body.classList.toggle("hard-mode", HARD_MODE);
  resetGame();
}

function startTimer() {
  clearInterval(timer);
  if (!HARD_MODE) {
    document.getElementById("timer").textContent = "∞";
    return;
  }
  timeLeft = 20;
  document.getElementById("timer").textContent = timeLeft;
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("message").textContent = "💀 Tiempo agotado";
      disableKeyboard();
    }
  }, 1000);
}

function startGame() {
  const selected = words[Math.floor(Math.random() * words.length)];
  word = selected.text;
  language = selected.lang;

  guessed = [];
  errors = 0;
  hintUsed = false;
  maxErrors = HARD_MODE ? 3 : 6;

  ctx.clearRect(0,0,200,200);
  document.getElementById("language").textContent = language;
  document.getElementById("message").textContent = "";

  renderWord();
  renderKeyboard();
  startTimer();
}

function renderWord() {
  const w = document.getElementById("word");
  w.innerHTML = "";
  word.split("").forEach(l => {
    const s = document.createElement("span");
    s.className = "letter";
    s.textContent = guessed.includes(l) ? l : "";
    w.appendChild(s);
  });
}

function renderKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  for (let i = 97; i <= 122; i++) {
    const b = document.createElement("button");
    b.textContent = String.fromCharCode(i);
    b.onclick = () => guess(b.textContent, b);
    kb.appendChild(b);
  }
}

function guess(l, b) {
  b.disabled = true;
  if (word.includes(l)) {
    guessed.push(l);
    renderWord();
    checkWin();
  } else {
    errors++;
    drawHangman(errors);
    checkLose();
  }
}

function giveHint() {
  if (hintUsed) return;
  const r = [...new Set(word.split(""))].filter(l => !guessed.includes(l));
  if (!r.length) return;
  guessed.push(r[Math.floor(Math.random()*r.length)]);
  hintUsed = true;
  errors += HARD_MODE ? 2 : 1;
  drawHangman(errors);
  renderWord();
  checkLose();
}

function checkWin() {
  if (word.split("").every(l => guessed.includes(l))) {
    wins++;
    localStorage.setItem("wins", wins);
    document.getElementById("wins").textContent = wins;
    document.getElementById("message").textContent = HARD_MODE
      ? "👁️ Lo lograste… increíble"
      : "🎉 Ganaste";
    disableKeyboard();
    clearInterval(timer);
  }
}

function checkLose() {
  if (errors >= maxErrors) {
    document.getElementById("message").textContent =
      `💀 Perdiste. Era "${word}"`;
    disableKeyboard();
    clearInterval(timer);
  }
}

function disableKeyboard() {
  document.querySelectorAll(".keyboard button").forEach(b => b.disabled = true);
}

function resetGame() {
  startGame();
}

startGame();
</script>
</body>
</html>
